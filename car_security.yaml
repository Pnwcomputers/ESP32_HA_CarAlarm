esphome:
  name: car-security
  friendly_name: Car Security Sensor
  on_boot:
    priority: 600
    then:
      - script.execute: update_display
      - script.execute: evaluate_and_sleep

esp32:
  board: esp32dev
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  on_connected:
    then:
      - script.execute: update_display
  on_disconnected:
    then:
      - script.execute: update_display

logger:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  password: !secret ota_password

# ─────────────────────────────────────────
# DEEP SLEEP
# Wakes on SW-420 vibration via GPIO13
# ─────────────────────────────────────────
deep_sleep:
  id: deep_sleep_control
  run_duration: 25s
  wakeup_pin:
    number: GPIO13
    inverted: false
  wakeup_pin_mode: INVERT_WAKEUP

# ─────────────────────────────────────────
# UART — LD2410C
# GPIO25 = ESP TX → LD2410 RX
# GPIO26 = ESP RX ← LD2410 TX
# ─────────────────────────────────────────
uart:
  tx_pin: GPIO25
  rx_pin: GPIO26
  baud_rate: 256000
  parity: NONE
  stop_bits: 1

ld2410:

# ─────────────────────────────────────────
# SPI — ST7789V Display (TTGO T-Display)
# ─────────────────────────────────────────
spi:
  clk_pin: GPIO18
  mosi_pin: GPIO19

display:
  - platform: ili9xxx
    model: ST7789V
    id: tft_display
    cs_pin: GPIO5
    dc_pin: GPIO16
    reset_pin: GPIO23
    rotation: 90
    lambda: |-
      // Background
      it.fill(Color(0, 0, 0));

      // ── Title bar ──
      it.filled_rectangle(0, 0, 240, 28, Color(30, 30, 30));
      it.print(8, 6, id(font_medium), Color(100, 200, 255), "PNWC CAR SECURITY");

      // ── WiFi status ──
      if (WiFi.status() == WL_CONNECTED) {
        it.print(200, 6, id(font_small), Color(0, 220, 0), "WiFi");
      } else {
        it.print(200, 6, id(font_small), Color(220, 50, 50), "WiFi");
      }

      // ── Vibration ──
      it.print(8, 40, id(font_small), Color(150, 150, 150), "VIBRATION:");
      if (id(vibration_sensor).state) {
        it.print(120, 40, id(font_medium), Color(255, 80, 80), "DETECTED");
      } else {
        it.print(120, 40, id(font_medium), Color(0, 200, 0), "CLEAR");
      }

      // ── Presence ──
      it.print(8, 70, id(font_small), Color(150, 150, 150), "PRESENCE:");
      if (id(car_presence).state) {
        it.print(120, 70, id(font_medium), Color(255, 80, 80), "DETECTED");
      } else {
        it.print(120, 70, id(font_medium), Color(0, 200, 0), "CLEAR");
      }

      // ── Detection distance ──
      it.print(8, 100, id(font_small), Color(150, 150, 150), "DISTANCE:");
      it.printf(120, 100, id(font_medium), Color(255, 200, 0), "%.0f cm",
        id(detection_distance).state);

      // ── Battery ──
      float volts = id(battery_voltage).state;
      it.print(8, 130, id(font_small), Color(150, 150, 150), "BATTERY:");
      Color batt_color = Color(0, 200, 0);
      if (volts < 3.5) batt_color = Color(255, 80, 80);
      else if (volts < 3.7) batt_color = Color(255, 165, 0);
      it.printf(120, 130, id(font_medium), batt_color, "%.2fV", volts);

      // ── Battery bar ──
      int batt_pct = (int)(((volts - 3.2) / (4.2 - 3.2)) * 100);
      batt_pct = max(0, min(100, batt_pct));
      it.rectangle(8, 115, 104, 10, Color(80, 80, 80));
      it.filled_rectangle(8, 115, batt_pct, 10, batt_color);

      // ── Divider ──
      it.horizontal_line(0, 155, 240, Color(50, 50, 50));

      // ── Status message ──
      if (id(car_presence).state && id(vibration_sensor).state) {
        it.print(8, 162, id(font_medium), Color(255, 50, 50), "!! INTRUDER ALERT !!");
      } else if (id(vibration_sensor).state) {
        it.print(8, 162, id(font_medium), Color(255, 165, 0), "VEHICLE DISTURBED");
      } else if (id(car_presence).state) {
        it.print(8, 162, id(font_medium), Color(255, 165, 0), "OCCUPANT DETECTED");
      } else {
        it.print(8, 162, id(font_medium), Color(0, 200, 0), "ALL CLEAR");
      }

# ─────────────────────────────────────────
# BACKLIGHT
# ─────────────────────────────────────────
output:
  - platform: ledc
    pin: GPIO4
    id: backlight_output

light:
  - platform: monochromatic
    output: backlight_output
    id: backlight
    name: "Display Backlight"
    default_transition_length: 0s
    restore_mode: ALWAYS_ON

# ─────────────────────────────────────────
# FONTS
# ─────────────────────────────────────────
font:
  - file: "gfonts://Roboto"
    id: font_small
    size: 12
  - file: "gfonts://Roboto"
    id: font_medium
    size: 16

# ─────────────────────────────────────────
# BINARY SENSORS
# ─────────────────────────────────────────
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO13
      mode:
        input: true
        pullup: true
    name: "Car Vibration"
    id: vibration_sensor
    device_class: vibration
    filters:
      - delayed_off: 3s
    on_press:
      then:
        - script.execute: update_display

  - platform: ld2410
    has_target:
      name: "Car Presence"
      id: car_presence
      on_state_change:
        then:
          - script.execute: update_display
    has_moving_target:
      name: "Car Movement"
    has_still_target:
      name: "Car Still Presence"

  # Onboard buttons
  - platform: gpio
    pin:
      number: GPIO0
      inverted: true
      mode:
        input: true
        pullup: true
    name: "Button Top"
    id: btn_top
    on_press:
      then:
        - deep_sleep.prevent: deep_sleep_control
        - script.execute: update_display

  - platform: gpio
    pin:
      number: GPIO35
      inverted: true
    name: "Button Bottom"
    id: btn_bottom

# ─────────────────────────────────────────
# SENSORS
# ─────────────────────────────────────────
sensor:
  - platform: ld2410
    detection_distance:
      name: "Car Detection Distance"
      id: detection_distance
    moving_distance:
      name: "Car Moving Distance"
    still_distance:
      name: "Car Still Distance"
    moving_energy:
      name: "Car Moving Energy"
    still_energy:
      name: "Car Still Energy"

  # Battery voltage via voltage divider on GPIO34
  # Use 100kΩ/100kΩ divider — LiPo 4.2V max reads as 2.1V (safe for ADC)
  - platform: adc
    pin: GPIO34
    name: "Car Battery Voltage"
    id: battery_voltage
    attenuation: 11db
    update_interval: 30s
    filters:
      - multiply: 2.0   # Compensate for divider
      - sliding_window_moving_average:
          window_size: 5
          send_every: 1
    unit_of_measurement: "V"
    accuracy_decimals: 2
    on_value:
      then:
        - script.execute: update_display

  - platform: wifi_signal
    name: "Car Sensor WiFi Signal"
    update_interval: 60s

# ─────────────────────────────────────────
# SCRIPTS
# ─────────────────────────────────────────
script:
  - id: update_display
    then:
      - component.update: tft_display

  - id: evaluate_and_sleep
    then:
      - delay: 20s
      - if:
          condition:
            binary_sensor.is_on: car_presence
          then:
            - logger.log: "Presence detected — staying awake"
            - deep_sleep.prevent: deep_sleep_control
          else:
            - logger.log: "No presence — returning to sleep"
            - deep_sleep.enter: deep_sleep_control
