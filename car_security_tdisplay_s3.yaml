# ═══════════════════════════════════════════════════════════════════
# PNWC CAR SECURITY SENSOR
# Hardware: LILYGO T-Display S3 + LD2410C + SW-420 + LiPo Battery
# Power: Auto-charges via USB when car is on; Deep Sleeps when car is off.
# ═══════════════════════════════════════════════════════════════════

esphome:
  name: car-security
  friendly_name: Car Security Sensor
  platformio_options:
    board_build.flash_mode: dio
  on_boot:
    priority: 600
    then:
      - light.turn_on:
          id: backlight
          brightness: 80%
      - script.execute: update_display
      - script.execute: evaluate_power_state

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: y

psram:
  mode: octal
  speed: 80MHz

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  power_save_mode: none

logger:
  level: INFO

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

# ─────────────────────────────────────────
# DEEP SLEEP & POWER SENSING
# ─────────────────────────────────────────
deep_sleep:
  id: deep_sleep_control
  wakeup_pin: GPIO1 # SW-420 Vibration Sensor
  wakeup_pin_mode: KEEP_AWAKE

binary_sensor:
  # Detects if USB 5V is present (Car Engine Running)
  - platform: gpio
    pin:
      number: GPIO43
      inverted: true
    id: usb_power_connected
    name: "Car Power Detected"
    on_press:
      then:
        - logger.log: "USB Power Connected - Disabling Deep Sleep"
        - deep_sleep.prevent: deep_sleep_control
        - light.turn_on: backlight
        - script.execute: update_display
    on_release:
      then:
        - logger.log: "USB Power Lost - Entering Deep Sleep in 30s"
        - script.execute: update_display
        - delay: 30s
        - if:
            condition:
              binary_sensor.is_off: usb_power_connected
            then:
              - light.turn_off: backlight
              - deep_sleep.enter: deep_sleep_control

  - platform: gpio
    pin:
      number: GPIO1
      mode:
        input: true
        pullup: true
    name: "Car Vibration"
    id: vibration_sensor
    device_class: vibration
    filters:
      - delayed_off: 3s
    on_press:
      then:
        - script.execute: update_display

  - platform: ld2410
    has_target:
      name: "Car Presence"
      id: car_presence
      on_state_change:
        then:
          - script.execute: update_display

# ─────────────────────────────────────────
# SCRIPTS
# ─────────────────────────────────────────
script:
  - id: evaluate_power_state
    then:
      - if:
          condition:
            binary_sensor.is_off: usb_power_connected
          then:
            - delay: 30s
            - if:
                condition:
                  binary_sensor.is_off: car_presence
                then:
                  - deep_sleep.enter: deep_sleep_control

  - id: update_display
    mode: single
    then:
      - component.update: tft_display

